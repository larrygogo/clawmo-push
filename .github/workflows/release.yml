name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run build

      # Pack with version in filename: clawmo-push-0.1.0.tgz
      - run: npm pack

      # Rename to include 'v' prefix for clarity
      - name: Rename artifact
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mv clawmo-push-*.tgz clawmo-push-v${VERSION}.tgz

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: clawmo-push-v*.tgz
          generate_release_notes: true
